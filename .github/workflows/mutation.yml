name: mutation test

on:
  pull_request:
    paths: &paths
      - 'src/**'
      - 'config/**'
      - 'tests/**'
      - 'phpunit.xml.dist'
      - 'infection.json.dist'
      - 'composer.json'
      - '.github/workflows/mutation.yml'
  push:
    branches: ['master']
    paths: *paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    uses: yiisoft/actions/.github/workflows/roave-infection.yml@master
    with:
      min-covered-msi: 100
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.5']
    secrets:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
